# ═════════════════════════════════════════════════════════════════════════════
# Deploy to GitHub Pages
# Just the Docs Theme - Optimized Build
# ═════════════════════════════════════════════════════════════════════════════

name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      # Configuration
      - '_config.yml'
      - 'Gemfile'
      - 'Gemfile.lock'
      # Main content
      - 'index.md'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      # Documentation
      - 'docs/**'
      # Assets
      - 'assets/**'
      - '_sass/**'
      - '_layouts/**'
      - '_includes/**'
      # Changelog
      - 'changelog/*.md'
      # Workflow
      - '.github/workflows/pages.yml'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug build (verbose logging)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: jekyll
          enablement: true

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          verbose: ${{ inputs.debug == 'true' }}
          future: true
          draft_posts: true

      - name: Verify build output
        run: |
          echo "📊 Build Statistics:"
          echo "Total files: $(find ./_site -type f | wc -l)"
          echo "HTML files: $(find ./_site -name '*.html' | wc -l)"
          echo "CSS files: $(find ./_site -name '*.css' | wc -l)"
          echo "JS files: $(find ./_site -name '*.js' | wc -l)"
          echo "Image files: $(find ./_site \( -name '*.svg' -o -name '*.png' -o -name '*.jpg' \) | wc -l)"
          
          if [[ ! -f "_site/index.html" ]]; then
            echo "❌ Error: index.html not found!"
            exit 1
          fi
          
          echo "✅ Build verification passed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

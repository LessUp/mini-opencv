<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558b00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#0d1117" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- GPU/CUDA chip design -->
  <rect x="35" y="35" width="50" height="50" rx="5" fill="url(#grad1)" filter="url(#glow)"/>
  
  <!-- Inner chip pattern -->
  <rect x="42" y="42" width="36" height="36" rx="3" fill="#0d1117"/>
  
  <!-- Core grid pattern -->
  <rect x="48" y="48" width="8" height="8" fill="#76b900"/>
  <rect x="60" y="48" width="8" height="8" fill="#76b900"/>
  <rect x="48" y="60" width="8" height="8" fill="#76b900"/>
  <rect x="60" y="60" width="8" height="8" fill="#76b900"/>
  
  <!-- Connection lines -->
  <line x1="30" y1="60" x2="35" y2="60" stroke="#76b900" stroke-width="2"/>
  <line x1="85" y1="60" x2="90" y2="60" stroke="#76b900" stroke-width="2"/>
  <line x1="60" y1="30" x2="60" y2="35" stroke="#76b900" stroke-width="2"/>
  <line x1="60" y1="85" x2="60" y2="90" stroke="#76b900" stroke-width="2"/>
  
  <!-- Corner accents -->
  <circle cx="25" cy="25" r="3" fill="#76b900"/>
  <circle cx="95" cy="25" r="3" fill="#76b900"/>
  <circle cx="25" cy="95" r="3" fill="#76b900"/>
  <circle cx="95" cy="95" r="3" fill="#76b900"/>
</svg>
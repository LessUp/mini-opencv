# GPU Image Processing - Jekyll/GitHub Pages Configuration
# Theme: Just the Docs v0.9.0

title: GPU Image Processing
description: >-
  High-performance CUDA-based GPU image processing library.
  30-50x faster than CPU OpenCV for comparable operations.
tagline: CUDA-Accelerated Computer Vision

# ═════════════════════════════════════════════════════════════════════════════
# THEME CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════

# Use Just the Docs theme (modern, search-enabled, responsive)
remote_theme: just-the-docs/just-the-docs@v0.9.0

# Enable all Jekyll plugins for enhanced functionality
plugins:
  - jekyll-remote-theme      # Remote theme support
  - jekyll-seo-tag          # SEO optimization
  - jekyll-github-metadata  # GitHub repository info
  - jekyll-relative-links   # Relative link conversion
  - jekyll-last-modified-at # Last modified timestamps

# ═════════════════════════════════════════════════════════════════════════════
# URL & BASE URL
# ═════════════════════════════════════════════════════════════════════════════

url: https://lessup.github.io
baseurl: /mini-opencv
repository: LessUp/mini-opencv

# ═════════════════════════════════════════════════════════════════════════════
# JUST THE DOCS THEME SETTINGS
# ═════════════════════════════════════════════════════════════════════════════

# Color scheme: auto respects system preference (light/dark)
color_scheme: auto

# Logo
logo: "/assets/images/logo.svg"

# Aux links (top right navigation)
aux_links:
  "GitHub":
    - "https://github.com/LessUp/mini-opencv"
  "Releases":
    - "https://github.com/LessUp/mini-opencv/releases"

# Aux link new tab
aux_links_new_tab: true

# Main navigation structure
nav_external_links:
  - title: GitHub
    url: https://github.com/LessUp/mini-opencv
    hide_icon: false

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Breadcrumbs
breadcrumbs: true

# ═════════════════════════════════════════════════════════════════════════════
# SEARCH CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# ═════════════════════════════════════════════════════════════════════════════
# FOOTER CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════

footer_content: >
  Copyright &copy; 2025-2026 LessUp.
  Distributed under the <a href="https://github.com/LessUp/mini-opencv/blob/main/LICENSE">MIT License</a>.

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# ═════════════════════════════════════════════════════════════════════════════
# CODE HIGHLIGHTING
# ═════════════════════════════════════════════════════════════════════════════

copy_code_button: true
syntax_highlighter: rouge
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# ═════════════════════════════════════════════════════════════════════════════
# CALL-OUTS / ALERTS
# ═════════════════════════════════════════════════════════════════════════════

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    color: blue
  new:
    color: green
  note:
    color: purple
  warning:
    color: red

# ═════════════════════════════════════════════════════════════════════════════
# Mermaid Diagrams
# ═════════════════════════════════════════════════════════════════════════════

mermaid:
  version: "10.9.1"

# ═════════════════════════════════════════════════════════════════════════════
# EXCLUDE FROM BUILD
# ═════════════════════════════════════════════════════════════════════════════

exclude:
  # Build artifacts
  - build/
  - cmake-build-*/
  - compile_commands.json
  
  # Source code (already in root)
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
  
  # Documentation build files
  - "*.gem"
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata

# ═════════════════════════════════════════════════════════════════════════════
# INCLUDE SPECIFIC FILES (from repo root)
# ═════════════════════════════════════════════════════════════════════════════

include:
  - CHANGELOG.md
  - CONTRIBUTING.md
  - LICENSE
  - README.md
  - README.zh-CN.md

# ═════════════════════════════════════════════════════════════════════════════
# DEFAULT LAYOUT
# ═════════════════════════════════════════════════════════════════════════════

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      nav_exclude: false

# ═════════════════════════════════════════════════════════════════════════════
# COMPRESSION (PERFORMANCE)
# ═════════════════════════════════════════════════════════════════════════════

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  startings: []
  blanklines: false
  profile: false

# ═════════════════════════════════════════════════════════════════════════════
# STRICT JEKYLL MODE
# ═════════════════════════════════════════════════════════════════════════════

strict_front_matter: true
liquid:
  error_mode: strict
  strict_filters: true
  strict_variables: false

# ═════════════════════════════════════════════════════════════════════════════
# PERMALINKS
# ═════════════════════════════════════════════════════════════════════════════

permalink: pretty
